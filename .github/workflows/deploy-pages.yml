name: Publicar Angular no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  OUTPUT_DIR: dist/cine-guerreiro/browser

jobs:
  build:
    name: Compilar o site
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Definir endereço-base do GitHub Pages
        id: base
        shell: bash
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"

          if [ "$REPOSITORY_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${REPOSITORY_NAME}/"
          fi

          echo "base_href=$BASE_HREF" >> "$GITHUB_OUTPUT"
          echo "O site será compilado com base href: $BASE_HREF"

      - name: Compilar Angular para produção
        run: npm run build -- --configuration production --base-href "${{ steps.base.outputs.base_href }}"

      - name: Preparar compatibilidade com GitHub Pages
        shell: bash
        run: |
          test -f "${{ env.OUTPUT_DIR }}/index.html"
          cp "${{ env.OUTPUT_DIR }}/index.html" "${{ env.OUTPUT_DIR }}/404.html"
          touch "${{ env.OUTPUT_DIR }}/.nojekyll"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar arquivos compilados
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.OUTPUT_DIR }}

  deploy:
    name: Publicar o site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Fazer deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
